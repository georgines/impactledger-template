[profile.default]
src       = "contracts"
test      = "test"
out       = "out"
libs      = ["contracts/lib"]
cache_path = "cache"

solc_version = "0.8.24"

remappings = [
  "forge-std/=contracts/lib/forge-std/src/",
]
optimizer    = true
optimizer_runs = 200

[profile.default.fmt]
line_length = 100
tab_width   = 4

[lint]
exclude_lints = ["unsafe-typecast", "unchecked-call", "incorrect-shift", "block-timestamp"]
